name: Build Minder ARM64 Flatpak Bundle

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Show architecture
        run: |
          uname -m
          dpkg --print-architecture || true

      - name: Install Flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak ca-certificates

      - name: Add Flathub
        run: |
          flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install Minder ARM64 from Flathub
        run: |
          flatpak --user install -y --arch=aarch64 flathub com.github.phase1geo.minder
          flatpak --user info com.github.phase1geo.minder

      - name: Create Flatpak bundle
        run: |
          flatpak build-bundle \
            ~/.local/share/flatpak/repo \
            Minder-2.0.9-arm64.flatpak \
            com.github.phase1geo.minder \
            stable

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Minder-2.0.9-arm64
          path: Minder-2.0.9-arm64.flatpak
          retention-days: 7
